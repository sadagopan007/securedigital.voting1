{% extends "base.html" %}
{% block title %}Admin Login · SecureVote{% endblock %}

{% block content %}
<div style="max-width:420px;margin:5rem auto;padding:2rem;">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:2.5rem;margin-bottom:.5rem;">🔐</div>
    <h1 style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-.03em;margin:0;">Admin Access</h1>
    <p style="color:var(--mid);font-size:.9rem;margin-top:.4rem;">Enter your password to access the election dashboard</p>
  </div>

  {% if error %}
  <div style="background:#fff5f5;border:1.5px solid #fcc;border-radius:10px;padding:.9rem 1.2rem;margin-bottom:1.5rem;color:var(--danger);font-size:.88rem;font-weight:500;">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/admin/login">
    <div style="margin-bottom:1.2rem;">
      <label style="display:block;font-size:.82rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;">Admin Password</label>
      <input type="password" name="password" required autofocus
        style="width:100%;box-sizing:border-box;padding:.85rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;background:var(--card);color:var(--ink);outline:none;"
        placeholder="Enter admin password">
    </div>
    <button type="submit"
      style="width:100%;padding:.9rem;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;">
      🔓 Login to Dashboard
    </button>
  </form>

  <p style="text-align:center;margin-top:1.5rem;font-size:.82rem;color:var(--mid);">
    <a href="/" style="color:var(--accent);text-decoration:none;">← Back to Voter Login</a>
  </p>
</div>
{% endblock %}
